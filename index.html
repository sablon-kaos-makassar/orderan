<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monito – Orderan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #FFFFFF;
    --ink:      #1A1A1A;
    --ink2:     #555555;
    --ink3:     #999999;
    --border:   #EBEBEB;
    --orange:   #E8603C;
    --orange-dk:#C94E2C;
    --orange-lt:#FEF0EC;
    --radius:   16px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    padding-top: 110px;
  }

  /* ── STICKY HEADER ── */
  .sticky-header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; background: #fff; }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
  }
  .brand { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
  .brand span { color: var(--orange); }
  .hamburger {
    width: 42px; height: 42px; background: var(--orange-lt); border: none; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; touch-action: manipulation;
  }
  .hamburger svg { width: 20px; height: 20px; stroke: var(--orange); stroke-width: 2.2; fill: none; stroke-linecap: round; }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex; overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch; touch-action: pan-x;
    border-bottom: 1.5px solid var(--border);
    scrollbar-width: none; padding: 0 12px;
  }
  .tab-nav::-webkit-scrollbar { display: none; }
  .tab-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 13px 14px 11px; border: none; background: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 600; color: var(--ink3);
    cursor: pointer; white-space: nowrap;
    border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
    transition: color .2s, border-color .2s; flex-shrink: 0; touch-action: manipulation;
  }
  .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-btn:hover:not(.active) { color: var(--ink2); }

  /* ── FILTER + USAHA BAR ── */
  .filter-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 10px 16px; display: flex; flex-direction: column; gap: 8px;
  }

  /* Toggle usaha */
  .usaha-toggle {
    display: flex; gap: 6px;
  }
  .usaha-btn {
    flex: 1; padding: 8px 12px; border-radius: 10px; border: 1.5px solid var(--border);
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .2s; background: #F9F9F9; color: var(--ink3);
    touch-action: manipulation; display: inline-flex; align-items: center; justify-content: center;
    gap: 5px; white-space: nowrap; flex-direction: row;
  }
  .usaha-btn.active {
    background: var(--orange-lt); color: var(--orange); border-color: var(--orange);
  }
  .usaha-btn.coming-soon {
    opacity: .55; cursor: not-allowed;
  }
  .badge-soon {
    font-size: 9px; font-weight: 700; background: #E0E0E0; color: #888;
    border-radius: 20px; padding: 1px 6px; letter-spacing: .5px;
  }

  /* Filter row */
  .filter-row { display: flex; align-items: center; gap: 8px; }
  .filter-bar select {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 9px 32px 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
    background: #F9F9F9; color: var(--ink); appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23E8603C' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 10px center;
    cursor: pointer; transition: border-color .2s; flex: 1; min-width: 0;
  }
  .filter-bar select:focus { outline: none; border-color: var(--orange); }
  .btn-filter {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700;
    padding: 10px 18px; background: var(--orange); color: #fff; border: none; border-radius: 10px;
    cursor: pointer; transition: background .2s, transform .1s;
    box-shadow: 0 3px 10px rgba(232,96,60,.25); white-space: nowrap; flex-shrink: 0; touch-action: manipulation;
  }
  .btn-filter:hover { background: var(--orange-dk); }
  .btn-filter:active { transform: scale(.97); }

  /* ── MAIN ── */
  .main { padding: 20px 16px 80px; }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-size: 10px; font-weight: 700; color: var(--ink3);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
  }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 24px; }
  .kpi-card { border-radius: var(--radius); padding: 16px 14px; animation: fadeUp .45s both; }
  .kpi-card.c-orange { background: #FEF0EC; }
  .kpi-card.c-blue   { background: #EEF3FE; }
  .kpi-card.c-teal   { background: #EBF8F8; }
  .kpi-card.c-yellow { background: #FEF9EC; }
  .kpi-card.c-green  { background: #EDFAF3; }
  .kpi-card.c-red    { background: #FFF2F2; }

  .kpi-emoji { font-size: 22px; margin-bottom: 8px; display: block; }
  .kpi-label { font-size: 12px; font-weight: 500; color: var(--ink2); margin-bottom: 4px; }
  .kpi-value { font-size: clamp(22px,5.5vw,32px); font-weight: 800; line-height: 1; color: var(--ink); }
  .kpi-sub   { font-size: 11px; color: var(--ink3); margin-top: 5px; line-height: 1.4; }

  /* ── PANEL ── */
  .panel {
    background: #fff; border-radius: var(--radius); padding: 16px 14px; margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06); animation: fadeUp .5s both;
  }
  .panel-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

  /* ── KATEGORI BARS ── */
  .kat-item { margin-bottom: 13px; }
  .kat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .kat-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .kat-num  { font-family: 'DM Mono',monospace; font-size: 13px; font-weight: 500; color: var(--ink2); }
  .bar-track { height: 8px; background: #F2F2F2; border-radius: 99px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.4,0,.2,1); }

  /* Bar warna berurutan */
  .bar-c0 { background: #E8603C; }
  .bar-c1 { background: #2BC4B4; }
  .bar-c2 { background: #5B8DEF; }
  .bar-c3 { background: #F5A623; }
  .bar-c4 { background: #9B59B6; }
  .bar-c5 { background: #27AE60; }

  /* ── DEADLINE LIST ── */
  .deadline-list { display: flex; flex-direction: column; gap: 8px; }
  .deadline-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 12px; background: #FAFAFA;
  }
  .deadline-badge {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; line-height: 1.1; text-align: center;
  }
  .badge-urgent   { background: #FFF0EE; color: #D0321A; }
  .badge-soon     { background: #FEF9EC; color: #B07D10; }
  .badge-ok       { background: #EDFAF3; color: #1A7A45; }
  .deadline-info  { flex: 1; min-width: 0; }
  .deadline-name  { font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deadline-meta  { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .deadline-tgl   { flex-shrink: 0; font-family: 'DM Mono',monospace; font-size: 11px; color: var(--ink2); text-align: right; }

  /* ── ORDER TABLE ── */
  .table-scroll-hint { font-size: 10px; color: var(--ink3); text-align: right; margin-bottom: 6px; }
  .table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .order-table { width: 100%; min-width: 480px; border-collapse: collapse; font-size: 12px; }
  .order-table th {
    text-align: left; padding: 7px 8px; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--ink3); border-bottom: 1.5px solid var(--border); background: #FAFAFA;
  }
  .order-table th:not(:first-child) { text-align: right; }
  .order-table td { padding: 9px 8px; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: middle; }
  .order-table td:not(:first-child) { text-align: right; font-family: 'DM Mono',monospace; font-size: 12px; }
  .order-table tr:last-child td { border-bottom: none; }
  .order-table tr:hover td { background: var(--orange-lt); }

  .pill { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 9px; font-weight: 700; }
  .pill-lunas { background: #EDFAF3; color: #1A7A45; }
  .pill-dp    { background: #FEF9EC; color: #B07D10; }
  .pill-other { background: #F2F2F2; color: #666; }

  /* ── LOADING / ERROR ── */
  .loading { text-align: center; padding: 60px 20px; color: var(--ink3); }
  .loading-spinner {
    width: 34px; height: 34px; border: 3px solid #F0F0F0;
    border-top-color: var(--orange); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 14px;
  }
  .error-msg {
    background: #FFF4F2; border: 1px solid #FDDDD7; border-radius: var(--radius);
    padding: 16px; color: #B03A20; font-size: 13px; line-height: 1.5;
  }

  /* ── SLIDE MENU ── */
  .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 100; }
  .menu-overlay.open { display: block; animation: fadeIn .2s both; }
  .slide-menu {
    position: fixed; top: 0; right: 0; width: min(320px,88vw); height: 100%;
    background: #fff; border-radius: 20px 0 0 20px;
    display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 101; overflow: hidden;
  }
  .slide-menu.open { transform: translateX(0); }
  .slide-menu-header {
    padding: 24px 20px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .slide-brand { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
  .slide-brand span { color: var(--orange); }
  .slide-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }
  .slide-close {
    width: 36px; height: 36px; background: #F5F5F5; border: none; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  }
  .slide-close svg { width: 16px; height: 16px; stroke: var(--ink2); stroke-width: 2.2; fill: none; stroke-linecap: round; }
  .slide-menu-footer { border-top: 1px solid var(--border); padding: 8px 20px 28px; display: flex; flex-direction: column; }
  .slide-item {
    display: flex; align-items: center; justify-content: space-between; padding: 14px 0;
    cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    font-family: 'Plus Jakarta Sans', sans-serif; border-bottom: 1px solid var(--border);
  }
  .slide-item-left { display: flex; align-items: center; gap: 12px; }
  .slide-item-emoji { font-size: 18px; width: 24px; text-align: center; }
  .slide-item-label { font-size: 15px; font-weight: 600; color: var(--ink); }
  .slide-item-arrow { font-size: 18px; color: var(--ink3); }
  .toggle-wrap { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; }
  .toggle-left { display: flex; align-items: center; gap: 12px; }
  .toggle-label { font-size: 15px; font-weight: 600; color: var(--ink); }
  .toggle {
    width: 46px; height: 27px; background: #E0E0E0; border-radius: 99px;
    position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; border: none;
  }
  .toggle.on { background: var(--orange); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 21px; height: 21px; background: #fff; border-radius: 50%;
    transition: left .2s; box-shadow: 0 1px 4px rgba(0,0,0,.15);
  }
  .toggle.on::after { left: 22px; }
  .slide-version { font-size: 12px; color: var(--ink3); padding-top: 14px; }

  /* ── DESKTOP ── */
  @media (min-width: 700px) {
    .topbar { padding: 20px 32px 16px; }
    .tab-nav { padding: 0 24px; }
    .filter-bar { padding: 10px 32px; flex-direction: row; align-items: center; }
    .usaha-toggle { flex-shrink: 0; }
    .filter-row { flex: 1; }
    .main { padding: 28px 32px 80px; max-width: 1200px; }
    .kpi-grid { grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1.6fr; gap: 16px; margin-bottom: 24px; }
    .two-col .panel { margin-bottom: 0; }
    .table-scroll-hint { display: none; }
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes spin   { to { transform:rotate(360deg); } }

  .kpi-card:nth-child(1){ animation-delay:.05s }
  .kpi-card:nth-child(2){ animation-delay:.10s }
  .kpi-card:nth-child(3){ animation-delay:.15s }
  .kpi-card:nth-child(4){ animation-delay:.20s }
  .kpi-card:nth-child(5){ animation-delay:.25s }
  .kpi-card:nth-child(6){ animation-delay:.30s }
</style>
</head>
<body>

<!-- STICKY HEADER -->
<div class="sticky-header">
  <div class="topbar">
    <div class="brand">Monito<span>.</span></div>
    <button class="hamburger" onclick="openMenu()" aria-label="Buka menu">
      <svg viewBox="0 0 20 20"><line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/></svg>
    </button>
  </div>
  <div class="tab-nav">
    <button class="tab-btn" onclick="switchTab('presensi')">📅 Presensi</button>
    <button class="tab-btn" onclick="switchTab('penjahit')">✂️ Penjahit</button>
    <button class="tab-btn" onclick="switchTab('stok')">📦 Stok Barang</button>
    <button class="tab-btn active">📋 Orderan</button>
    <button class="tab-btn" onclick="switchTab('produksi')">🏭 Produksi</button>
    <button class="tab-btn" onclick="switchTab('keuangan')">💰 Keuangan</button>
    <button class="tab-btn" onclick="switchTab('alat-bahan')">🧰 Alat & Bahan</button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <!-- Toggle usaha -->
  <div class="usaha-toggle">
    <button class="usaha-btn active" id="btn-proneto" onclick="switchUsaha('proneto')">🧵 Proneto</button>
    <button class="usaha-btn" id="btn-clothivo" onclick="switchUsaha('clothivo')">👕 Clothivo</button>
  </div>
  <!-- Filter bulan & tahun -->
  <div class="filter-row">
    <select id="sel-bulan">
      <option value="">Semua Bulan</option>
      <option value="1">Januari</option><option value="2">Februari</option>
      <option value="3">Maret</option><option value="4">April</option>
      <option value="5">Mei</option><option value="6">Juni</option>
      <option value="7">Juli</option><option value="8">Agustus</option>
      <option value="9">September</option><option value="10">Oktober</option>
      <option value="11">November</option><option value="12">Desember</option>
    </select>
    <select id="sel-tahun"></select>
    <button class="btn-filter" onclick="loadData()">Tampilkan</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="loading" id="loading-state">
    <div class="loading-spinner"></div>
    <div style="font-size:14px;">Memuat data...</div>
  </div>
  <div id="dashboard-content" style="display:none;"></div>
</div>

<!-- OVERLAY -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>

<!-- SLIDE MENU -->
<div class="slide-menu" id="slide-menu">
  <div class="slide-menu-header">
    <div>
      <div class="slide-brand">Monito<span>.</span></div>
      <div class="slide-sub">Sistem manajemen bisnis</div>
    </div>
    <button class="slide-close" onclick="closeMenu()">
      <svg viewBox="0 0 16 16"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
    </button>
  </div>
  <div style="flex:1;"></div>
  <div class="slide-menu-footer">
    <button class="slide-item" onclick="alert('Pengaturan')">
      <div class="slide-item-left">
        <span class="slide-item-emoji">⚙️</span>
        <span class="slide-item-label">Pengaturan</span>
      </div>
      <span class="slide-item-arrow">›</span>
    </button>
    <div class="toggle-wrap">
      <div class="toggle-left">
        <span class="slide-item-emoji">🌙</span>
        <span class="toggle-label">Mode gelap</span>
      </div>
      <button class="toggle" id="dark-toggle" onclick="toggleDark()"></button>
    </div>
    <div class="slide-version">v1.0 · Monito App</div>
  </div>
</div>

<script>
  // ── GANTI URL INI SETELAH DEPLOY APPS SCRIPT ──
  const PRONETO_URL = "https://script.google.com/macros/s/AKfycbxL4zAlzu3rikATXao7fePEc8vYQxeYUi_AsK7Tz1u9y4g6pmkLgi0CBaYuqHtgyjFSCw/exec";
  // Clothivo menyusul — isi nanti
  const CLOTHIVO_URL = "";

  const BULAN_NAMES = ["","Januari","Februari","Maret","April","Mei","Juni",
    "Juli","Agustus","September","Oktober","November","Desember"];

  let activeUsaha = 'proneto';

  // ── NAVIGASI TAB (ke halaman lain) ──
  function switchTab(id) {
    const links = {
      presensi:    'https://sablon-kaos-makassar.github.io/presensi-karyawan',
      penjahit:    'https://sablon-kaos-makassar.github.io/laporan-penjahit',
      stok:        'https://sablon-kaos-makassar.github.io/stok-barang',
      produksi:    'https://sablon-kaos-makassar.github.io/produksi',
      keuangan:    'https://sablon-kaos-makassar.github.io/laporan-keuangan',
      'alat-bahan':'https://sablon-kaos-makassar.github.io/alat-bahan',
    };
    if (links[id]) window.location.href = links[id];
  }

  // ── TOGGLE USAHA ──
  function switchUsaha(usaha) {
    if (usaha === 'clothivo') return; // coming soon
    activeUsaha = usaha;
    document.getElementById('btn-proneto').classList.toggle('active', usaha === 'proneto');
    loadData();
  }

  // ── MENU ──
  function openMenu() {
    document.getElementById('menu-overlay').classList.add('open');
    setTimeout(() => document.getElementById('slide-menu').classList.add('open'), 10);
    document.body.style.overflow = 'hidden';
  }
  function closeMenu() {
    document.getElementById('slide-menu').classList.remove('open');
    document.getElementById('menu-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function toggleDark() { document.getElementById('dark-toggle').classList.toggle('on'); }

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', () => {
    fixHeaderOffset();
    populateYears();
    setDefaultFilter();
    loadData();
    // Scroll tab aktif ke tengah layar
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) activeTab.scrollIntoView({ inline: 'center', block: 'nearest' });
  });
  window.addEventListener('resize', fixHeaderOffset);

  function fixHeaderOffset() {
    const h = document.querySelector('.sticky-header').offsetHeight;
    document.body.style.paddingTop = h + 'px';
  }
  function populateYears() {
    const sel = document.getElementById('sel-tahun');
    for (let y = 2030; y >= 2026; y--) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y; sel.appendChild(o);
    }
  }
  function setDefaultFilter() {
    const now = new Date();
    document.getElementById('sel-bulan').value = now.getMonth() + 1;
    document.getElementById('sel-tahun').value = now.getFullYear();
  }

  // ── LOAD DATA ──
  async function loadData() {
    showLoading(true);
    const bulan = document.getElementById('sel-bulan').value || 0;
    const tahun = document.getElementById('sel-tahun').value;
    const url   = activeUsaha === 'proneto' ? PRONETO_URL : CLOTHIVO_URL;

    if (!url) { showError('URL Apps Script belum diisi.'); return; }

    try {
      const res = await fetch(`${url}?page=produksi&bulan=${bulan}&tahun=${tahun}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderDashboard(data);
    } catch (err) { showError(err.message); }
  }

  function showLoading(on) {
    document.getElementById('loading-state').style.display  = on ? 'block' : 'none';
    document.getElementById('dashboard-content').style.display = on ? 'none' : 'block';
  }
  function showError(msg) {
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
    document.getElementById('dashboard-content').innerHTML =
      `<div class="error-msg">⚠️ Gagal memuat data: ${msg}<br>
       <small style="margin-top:6px;display:block;">Pastikan URL Apps Script sudah benar dan sudah di-deploy sebagai Web App.</small></div>`;
  }

  // ── RENDER ──
  function renderDashboard(d) {
    const { bulan, tahun } = d.filter;
    const bulanLabel  = bulan ? BULAN_NAMES[bulan] : 'Semua Bulan';
    const periodeLabel= `${bulanLabel} ${tahun}`.trim();
    const usahaLabel  = activeUsaha === 'proneto' ? '🧵 Proneto' : '👕 Clothivo';

    const maxKat = d.kategori[0]?.qty || 1;

    // Pill status
    function pillStatus(s) {
      const lower = s.toLowerCase();
      if (lower === 'lunas') return `<span class="pill pill-lunas">Lunas</span>`;
      if (lower === 'dp')    return `<span class="pill pill-dp">DP</span>`;
      return `<span class="pill pill-other">${s || '—'}</span>`;
    }

    // Badge deadline
    function deadlineBadge(hari) {
      const cls = hari === 0 ? 'badge-urgent' : hari <= 2 ? 'badge-soon' : 'badge-ok';
      const txt = hari === 0 ? 'Hari<br>ini' : `${hari}<br>hari`;
      return `<div class="deadline-badge ${cls}">${txt}</div>`;
    }

    const html = `
      <div class="sec-title">${usahaLabel} · ${periodeLabel}</div>

      <!-- KPI -->
      <div class="kpi-grid">
        <div class="kpi-card c-orange">
          <span class="kpi-emoji">📦</span>
          <div class="kpi-label">Total Produk</div>
          <div class="kpi-value">${fmt(d.totalQty)}</div>
          <div class="kpi-sub">unit dipesan</div>
        </div>
        <div class="kpi-card c-blue">
          <span class="kpi-emoji">🧾</span>
          <div class="kpi-label">Invoice</div>
          <div class="kpi-value">${fmt(d.totalInvoice)}</div>
          <div class="kpi-sub">${fmt(d.totalCustomer)} customer</div>
        </div>
        <div class="kpi-card c-green">
          <span class="kpi-emoji">💰</span>
          <div class="kpi-label">Total Penjualan</div>
          <div class="kpi-value" style="font-size:clamp(16px,4.5vw,26px);">${fmtRp(d.totalPenjualan)}</div>
          <div class="kpi-sub">periode ini</div>
        </div>
        <div class="kpi-card c-red">
          <span class="kpi-emoji">⏳</span>
          <div class="kpi-label">Belum Lunas</div>
          <div class="kpi-value">${fmt(d.jumlahBelumLunas)}</div>
          <div class="kpi-sub">invoice · sisa ${fmtRp(d.totalOutstanding)}</div>
        </div>
        ${d.produkTerlaku ? `
        <div class="kpi-card c-teal">
          <span class="kpi-emoji">🏆</span>
          <div class="kpi-label">Produk Terlaku</div>
          <div class="kpi-value" style="font-size:clamp(16px,4vw,22px);line-height:1.2;">${d.produkTerlaku.nama}</div>
          <div class="kpi-sub">${fmt(d.produkTerlaku.qty)} unit</div>
        </div>` : ''}
        ${d.produkTersepi && d.kategori.length > 1 ? `
        <div class="kpi-card c-yellow">
          <span class="kpi-emoji">🔻</span>
          <div class="kpi-label">Produk Tersepi</div>
          <div class="kpi-value" style="font-size:clamp(16px,4vw,22px);line-height:1.2;">${d.produkTersepi.nama}</div>
          <div class="kpi-sub">${fmt(d.produkTersepi.qty)} unit</div>
        </div>` : ''}
      </div>

      <!-- Kategori -->
      <div class="panel">
          <div class="panel-title">📊 Per Kategori Produk</div>
          ${d.kategori.length ? d.kategori.map((k, i) => `
            <div class="kat-item">
              <div class="kat-header">
                <span class="kat-name">${k.nama}</span>
                <span class="kat-num">${fmt(k.qty)}</span>
              </div>
              <div class="bar-track">
                <div class="bar-fill bar-c${i % 6}" style="width:${Math.round((k.qty/maxKat)*100)}%"></div>
              </div>
            </div>`).join('') : '<div style="color:var(--ink3);font-size:13px;">Tidak ada data.</div>'}
        </div>

      <!-- Order Terbaru -->
      <div class="panel">
        <div class="panel-title">🕐 Order Terbaru</div>
        <div class="table-scroll-hint">← geser untuk lihat semua →</div>
        <div class="table-scroll-wrap">
          <table class="order-table">
            <thead>
              <tr>
                <th>Customer</th>
                <th>Produk</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Tgl</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${d.orderTerbaru.length ? d.orderTerbaru.map(o => `
              <tr>
                <td style="font-weight:600;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o.nama}</td>
                <td style="text-align:left !important;font-family:inherit;">${o.produk}<br><span style="color:var(--ink3);font-size:10px;">${o.warna}</span></td>
                <td>${fmt(o.qty)}</td>
                <td>${fmtRp(o.total)}</td>
                <td>${o.tanggal}</td>
                <td>${pillStatus(o.status)}</td>
              </tr>`).join('') : `<tr><td colspan="6" style="text-align:center;color:var(--ink3);padding:20px;">Tidak ada data.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    `;

    document.getElementById('dashboard-content').innerHTML = html;
    showLoading(false);

    // Animasi bar
    setTimeout(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        const w = el.style.width; el.style.width = '0';
        requestAnimationFrame(() => { el.style.width = w; });
      });
    }, 50);
  }

  function fmt(n)    { return Number(n||0).toLocaleString('id-ID'); }
  // BARU
  function fmtRp(n) {
    return 'Rp' + Number(n||0).toLocaleString('id-ID');
  }
  // function fmtRp(n)  {
  //   const num = Number(n||0);
  //   if (num >= 1_000_000) return 'Rp' + (num/1_000_000).toFixed(1).replace('.',',') + 'jt';
  //   return 'Rp' + num.toLocaleString('id-ID');
  // }
  
</script>
</body>
</html>
